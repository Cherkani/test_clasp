<script>
const AppState = {
  currentPage: 'dashboard',
  syncStatus: 'synced',
  clients: [],
  providers: [],
  products: [],
  documents: [],
  documentItems: [],
  inventory: [],
  documentTypes: [],
  taxRate: 0,
  documentDraft: null,
  documentItemsDraft: []
};

const API = {
  getAppData() {
    return new Promise((resolve) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(() => resolve(null))
        .getAppData();
    });
  },
  saveClient(client) {
    return new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).saveClient(client);
    });
  },
  saveProvider(provider) {
    return new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).saveProvider(provider);
    });
  },
  saveProduct(product) {
    return new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).saveProduct(product);
    });
  },
  saveDocument(payload) {
    return new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).saveDocument(payload);
    });
  },
  deleteClient(id) {
    return new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).deleteClient(id);
    });
  },
  deleteProvider(id) {
    return new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).deleteProvider(id);
    });
  },
  deleteProduct(id) {
    return new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).deleteProduct(id);
    });
  },
  deleteDocument(id) {
    return new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).deleteDocument(id);
    });
  }
};

const DataStore = {
  apply(data) {
    if (!data) return;
    AppState.clients = data.clients || [];
    AppState.providers = data.providers || [];
    AppState.products = data.products || [];
    AppState.documents = data.documents || [];
    AppState.documentItems = data.documentItems || [];
    AppState.inventory = data.inventory || [];
    AppState.documentTypes = data.documentTypes || [];
    AppState.taxRate = Number(data.taxRate) || 0;
    setSyncStatus('synced');
  },
  async refresh() {
    const data = await API.getAppData();
    this.apply(data);
  }
};

function setSyncStatus(status) {
  AppState.syncStatus = status;
  Sidebar.render();
}

async function runWithSyncStatus(task) {
  setSyncStatus('saving');
  try {
    const result = await task();
    setSyncStatus('synced');
    return result;
  } catch (error) {
    setSyncStatus('error');
    throw error;
  }
}

function attachSyncWatcher(form) {
  form.addEventListener('input', () => setSyncStatus('unsynced'));
  form.addEventListener('change', () => setSyncStatus('unsynced'));
}

const Format = {
  currency(value) {
    return new Intl.NumberFormat('fr-MA', {
      style: 'currency',
      currency: 'MAD'
    }).format(Number(value) || 0);
  },
  date(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return value;
    return date.toISOString().slice(0, 10);
  }
};

const DOM = {
  create(tag, className = '', text = '') {
    const el = document.createElement(tag);
    if (className) el.className = className;
    if (text) el.textContent = text;
    return el;
  }
};

const Sidebar = {
  render() {
    const sidebar = DOM.create('aside', 'sidebar');
    const brand = DOM.create('div', 'sidebar-brand');
    brand.textContent = 'Sales Desk';
    sidebar.appendChild(brand);

    const nav = DOM.create('nav', 'sidebar-nav');
    const pages = [
      { id: 'dashboard', label: 'Dashboard' },
      { id: 'clients', label: 'Clients' },
      { id: 'documents', label: 'Documents' },
      { id: 'products', label: 'Products' },
      { id: 'providers', label: 'Providers' },
      { id: 'inventory', label: 'Inventory' }
    ];
    pages.forEach(page => {
      const item = DOM.create('button', `sidebar-link ${AppState.currentPage === page.id ? 'active' : ''}`);
      item.textContent = page.label;
      item.onclick = () => Router.navigate(page.id);
      nav.appendChild(item);
    });
    sidebar.appendChild(nav);

    const syncIndicator = DOM.create('button', `sync-status ${AppState.syncStatus}`);
    const syncLabels = {
      synced: 'Synced with Sheety',
      saving: 'Saving to Sheety...',
      unsynced: 'Unsynced changes',
      error: 'Sync failed'
    };
    syncIndicator.type = 'button';
    syncIndicator.disabled = true;
    syncIndicator.textContent = syncLabels[AppState.syncStatus] || 'Sync status';
    sidebar.appendChild(syncIndicator);

    const root = document.getElementById('root');
    const existing = document.querySelector('.sidebar');
    if (existing) existing.replaceWith(sidebar);
    else root.appendChild(sidebar);
  }
};

const Router = {
  navigate(page) {
    AppState.currentPage = page;
    this.render();
  },
  render() {
    Sidebar.render();
    const root = document.getElementById('root');
    let main = document.querySelector('.main');
    if (!main) {
      main = DOM.create('main', 'main');
      root.appendChild(main);
    }
    main.innerHTML = '';
    let content;
    switch (AppState.currentPage) {
      case 'clients':
        content = ClientsPage.render();
        break;
      case 'documents':
        content = DocumentsPage.render();
        break;
      case 'products':
        content = ProductsPage.render();
        break;
      case 'providers':
        content = ProvidersPage.render();
        break;
      case 'inventory':
        content = InventoryPage.render();
        break;
      default:
        content = Dashboard.render();
    }
    main.appendChild(content);
  }
};

const Dashboard = {
  render() {
    const container = DOM.create('div', 'page');
    container.appendChild(DOM.create('h1', 'page-title', 'Dashboard'));

    const cards = DOM.create('div', 'card-grid');
    cards.appendChild(this.card('Clients', AppState.clients.length));
    cards.appendChild(this.card('Documents', AppState.documents.length));
    cards.appendChild(this.card('Products', AppState.products.length));
    cards.appendChild(this.card('Stock Items', AppState.inventory.length));
    container.appendChild(cards);

    const totals = AppState.documents.reduce((acc, doc) => acc + (Number(doc.total) || 0), 0);
    const totalCard = DOM.create('div', 'card');
    totalCard.innerHTML = `<div class="card-label">Total Sales</div><div class="card-value">${Format.currency(totals)}</div>`;
    container.appendChild(totalCard);

    return container;
  },
  card(label, value) {
    const card = DOM.create('div', 'card');
    card.innerHTML = `<div class="card-label">${label}</div><div class="card-value">${value}</div>`;
    return card;
  }
};

const ClientsPage = {
  render() {
    const container = DOM.create('div', 'page');
    container.appendChild(DOM.create('h1', 'page-title', 'Clients'));
    container.appendChild(this.renderForm());
    container.appendChild(this.renderTable());
    return container;
  },
  renderForm(client = {}) {
    const form = DOM.create('form', 'form-card');
    form.innerHTML = `
      <div class="form-row">
        <label>Client Name<input name="name" value="${client.name || ''}" required></label>
        <label>Phone<input name="phone" value="${client.phone || ''}"></label>
        <label>Email<input name="email" value="${client.email || ''}"></label>
      </div>
      <div class="form-row">
        <label>Address<input name="address" value="${client.address || ''}"></label>
        <label>City<input name="city" value="${client.city || ''}"></label>
        <label>Notes<input name="notes" value="${client.notes || ''}"></label>
      </div>
      <button class="btn" type="submit">Save Client</button>
    `;
    form.onsubmit = async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      if (client.id) payload.id = client.id;
      await runWithSyncStatus(() => API.saveClient(payload));
      await DataStore.refresh();
      Router.render();
    };
    attachSyncWatcher(form);
    return form;
  },
  renderTable() {
    const table = DOM.create('div', 'table');
    const header = DOM.create('div', 'table-row table-header');
    ['Name', 'Phone', 'Email', 'City', 'Actions'].forEach(label => header.appendChild(DOM.create('div', '', label)));
    table.appendChild(header);

    AppState.clients.forEach(client => {
      const row = DOM.create('div', 'table-row');
      row.appendChild(DOM.create('div', '', client.name || ''));
      row.appendChild(DOM.create('div', '', client.phone || ''));
      row.appendChild(DOM.create('div', '', client.email || ''));
      row.appendChild(DOM.create('div', '', client.city || ''));
      const actions = DOM.create('div', 'table-actions');
      const edit = DOM.create('button', 'link-btn', 'Edit');
      edit.onclick = () => {
        const page = this.render();
        page.querySelector('form').replaceWith(this.renderForm(client));
        document.querySelector('.main').innerHTML = '';
        document.querySelector('.main').appendChild(page);
      };
      const remove = DOM.create('button', 'link-btn danger', 'Delete');
      remove.onclick = async () => {
        await runWithSyncStatus(() => API.deleteClient(client.id));
        await DataStore.refresh();
        Router.render();
      };
      actions.appendChild(edit);
      actions.appendChild(remove);
      row.appendChild(actions);
      table.appendChild(row);
    });
    return table;
  }
};

const ProvidersPage = {
  render() {
    const container = DOM.create('div', 'page');
    container.appendChild(DOM.create('h1', 'page-title', 'Providers'));
    container.appendChild(this.renderForm());
    container.appendChild(this.renderTable());
    return container;
  },
  renderForm(provider = {}) {
    const form = DOM.create('form', 'form-card');
    form.innerHTML = `
      <div class="form-row">
        <label>Provider Name<input name="name" value="${provider.name || ''}" required></label>
        <label>Phone<input name="phone" value="${provider.phone || ''}"></label>
        <label>Email<input name="email" value="${provider.email || ''}"></label>
      </div>
      <div class="form-row">
        <label>Address<input name="address" value="${provider.address || ''}"></label>
        <label>City<input name="city" value="${provider.city || ''}"></label>
        <label>Notes<input name="notes" value="${provider.notes || ''}"></label>
      </div>
      <button class="btn" type="submit">Save Provider</button>
    `;
    form.onsubmit = async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      if (provider.id) payload.id = provider.id;
      await runWithSyncStatus(() => API.saveProvider(payload));
      await DataStore.refresh();
      Router.render();
    };
    attachSyncWatcher(form);
    return form;
  },
  renderTable() {
    const table = DOM.create('div', 'table');
    const header = DOM.create('div', 'table-row table-header');
    ['Name', 'Phone', 'Email', 'City', 'Actions'].forEach(label => header.appendChild(DOM.create('div', '', label)));
    table.appendChild(header);
    AppState.providers.forEach(provider => {
      const row = DOM.create('div', 'table-row');
      row.appendChild(DOM.create('div', '', provider.name || ''));
      row.appendChild(DOM.create('div', '', provider.phone || ''));
      row.appendChild(DOM.create('div', '', provider.email || ''));
      row.appendChild(DOM.create('div', '', provider.city || ''));
      const actions = DOM.create('div', 'table-actions');
      const edit = DOM.create('button', 'link-btn', 'Edit');
      edit.onclick = () => {
        const page = this.render();
        page.querySelector('form').replaceWith(this.renderForm(provider));
        document.querySelector('.main').innerHTML = '';
        document.querySelector('.main').appendChild(page);
      };
      const remove = DOM.create('button', 'link-btn danger', 'Delete');
      remove.onclick = async () => {
        await runWithSyncStatus(() => API.deleteProvider(provider.id));
        await DataStore.refresh();
        Router.render();
      };
      actions.appendChild(edit);
      actions.appendChild(remove);
      row.appendChild(actions);
      table.appendChild(row);
    });
    return table;
  }
};

const ProductsPage = {
  render() {
    const container = DOM.create('div', 'page');
    container.appendChild(DOM.create('h1', 'page-title', 'Products'));
    container.appendChild(this.renderForm());
    container.appendChild(this.renderTable());
    return container;
  },
  renderForm(product = {}) {
    const form = DOM.create('form', 'form-card');
    form.innerHTML = `
      <div class="form-row">
        <label>SKU<input name="sku" value="${product.sku || ''}"></label>
        <label>Product Name<input name="name" value="${product.name || ''}" required></label>
        <label>Unit<input name="unit" value="${product.unit || ''}"></label>
      </div>
      <div class="form-row">
        <label>Purchase Price<input type="number" step="0.01" name="purchasePrice" value="${product.purchasePrice || ''}"></label>
        <label>Sale Price<input type="number" step="0.01" name="salePrice" value="${product.salePrice || ''}"></label>
        <label>Stock<input type="number" step="1" name="stock" value="${product.stock || 0}"></label>
      </div>
      <div class="form-row">
        <label>Provider
          <select name="providerId">
            <option value="">None</option>
            ${AppState.providers.map(provider => `
              <option value="${provider.id}" ${String(product.providerId) === String(provider.id) ? 'selected' : ''}>${provider.name}</option>
            `).join('')}
          </select>
        </label>
      </div>
      <button class="btn" type="submit">Save Product</button>
    `;
    form.onsubmit = async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      if (product.id) payload.id = product.id;
      await runWithSyncStatus(() => API.saveProduct(payload));
      await DataStore.refresh();
      Router.render();
    };
    attachSyncWatcher(form);
    return form;
  },
  renderTable() {
    const table = DOM.create('div', 'table');
    const header = DOM.create('div', 'table-row table-header');
    ['SKU', 'Name', 'Stock', 'Sale Price', 'Provider', 'Actions'].forEach(label => header.appendChild(DOM.create('div', '', label)));
    table.appendChild(header);
    AppState.products.forEach(product => {
      const row = DOM.create('div', 'table-row');
      row.appendChild(DOM.create('div', '', product.sku || ''));
      row.appendChild(DOM.create('div', '', product.name || ''));
      row.appendChild(DOM.create('div', '', product.stock ?? ''));
      row.appendChild(DOM.create('div', '', Format.currency(product.salePrice)));
      const provider = AppState.providers.find(item => String(item.id) === String(product.providerId));
      row.appendChild(DOM.create('div', '', provider ? provider.name : ''));
      const actions = DOM.create('div', 'table-actions');
      const edit = DOM.create('button', 'link-btn', 'Edit');
      edit.onclick = () => {
        const page = this.render();
        page.querySelector('form').replaceWith(this.renderForm(product));
        document.querySelector('.main').innerHTML = '';
        document.querySelector('.main').appendChild(page);
      };
      const remove = DOM.create('button', 'link-btn danger', 'Delete');
      remove.onclick = async () => {
        await runWithSyncStatus(() => API.deleteProduct(product.id));
        await DataStore.refresh();
        Router.render();
      };
      actions.appendChild(edit);
      actions.appendChild(remove);
      row.appendChild(actions);
      table.appendChild(row);
    });
    return table;
  }
};

const DocumentsPage = {
  render() {
    const container = DOM.create('div', 'page');
    container.appendChild(DOM.create('h1', 'page-title', 'Documents'));
    container.appendChild(this.renderForm());
    container.appendChild(this.renderTable());
    return container;
  },
  resetDraft() {
    AppState.documentDraft = null;
    AppState.documentItemsDraft = [];
  },
  renderForm(document = AppState.documentDraft || {}) {
    const form = DOM.create('form', 'form-card');
    form.innerHTML = `
      <div class="form-row">
        <label>Type
          <select name="type">
            ${AppState.documentTypes.map(type => `
              <option value="${type}" ${document.type === type ? 'selected' : ''}>${type.replace('_', ' ')}</option>
            `).join('')}
          </select>
        </label>
        <label>Date<input type="date" name="date" value="${Format.date(document.date) || ''}" required></label>
        <label>Number<input name="number" value="${document.number || ''}"></label>
      </div>
      <div class="form-row">
        <label>Client
          <select name="clientId">
            <option value="">Select client</option>
            ${AppState.clients.map(client => `
              <option value="${client.id}" ${String(document.clientId) === String(client.id) ? 'selected' : ''}>${client.name}</option>
            `).join('')}
          </select>
        </label>
        <label>Provider (optional)
          <select name="providerId">
            <option value="">None</option>
            ${AppState.providers.map(provider => `
              <option value="${provider.id}" ${String(document.providerId) === String(provider.id) ? 'selected' : ''}>${provider.name}</option>
            `).join('')}
          </select>
        </label>
        <label>Status<input name="status" value="${document.status || 'open'}"></label>
      </div>
      <label>Notes<input name="notes" value="${document.notes || ''}"></label>
      <div class="items-section">
        <div class="items-header">Document Items</div>
        <div class="items-table"></div>
        <button class="btn secondary" type="button" id="add-item">Add Item</button>
      </div>
      <button class="btn" type="submit">Save Document</button>
    `;

    const itemsTable = form.querySelector('.items-table');
    const items = AppState.documentItemsDraft.length > 0
      ? AppState.documentItemsDraft
      : this.getItemsForDocument(document.id);
    this.renderItems(itemsTable, items);

    form.querySelector('#add-item').onclick = () => {
      const newItem = { productId: '', description: '', quantity: 1, unitPrice: 0, discount: 0 };
      AppState.documentItemsDraft = [...items, newItem];
      this.renderItems(itemsTable, AppState.documentItemsDraft);
      setSyncStatus('unsynced');
    };

    form.onsubmit = async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      if (document.id) payload.id = document.id;
      const itemRows = this.collectItems(itemsTable);
      await runWithSyncStatus(() => API.saveDocument({ document: payload, items: itemRows }));
      this.resetDraft();
      await DataStore.refresh();
      Router.render();
    };
    attachSyncWatcher(form);
    return form;
  },
  renderItems(container, items) {
    container.innerHTML = '';
    const header = DOM.create('div', 'items-row items-header-row');
    ['Product', 'Description', 'Qty', 'Unit Price', 'Discount', 'Actions'].forEach(label => header.appendChild(DOM.create('div', '', label)));
    container.appendChild(header);
    items.forEach((item, index) => {
      const row = DOM.create('div', 'items-row');
      row.innerHTML = `
        <div>
          <select name="productId">
            <option value="">Select</option>
            ${AppState.products.map(product => `
              <option value="${product.id}" ${String(item.productId) === String(product.id) ? 'selected' : ''}>${product.name}</option>
            `).join('')}
          </select>
        </div>
        <div><input name="description" value="${item.description || ''}"></div>
        <div><input type="number" step="1" name="quantity" value="${item.quantity || 0}"></div>
        <div><input type="number" step="0.01" name="unitPrice" value="${item.unitPrice || 0}"></div>
        <div><input type="number" step="0.01" name="discount" value="${item.discount || 0}"></div>
        <div><button class="link-btn danger" type="button">Remove</button></div>
      `;
      row.querySelector('button').onclick = () => {
        const updated = items.filter((_, idx) => idx !== index);
        AppState.documentItemsDraft = updated;
        this.renderItems(container, updated);
        setSyncStatus('unsynced');
      };
      container.appendChild(row);
    });
    AppState.documentItemsDraft = items;
  },
  collectItems(container) {
    const rows = [...container.querySelectorAll('.items-row')].slice(1);
    return rows.map(row => {
      const productId = row.querySelector('select[name="productId"]').value;
      const description = row.querySelector('input[name="description"]').value;
      const quantity = row.querySelector('input[name="quantity"]').value;
      const unitPrice = row.querySelector('input[name="unitPrice"]').value;
      const discount = row.querySelector('input[name="discount"]').value;
      return { productId, description, quantity, unitPrice, discount };
    }).filter(item => item.productId || item.description);
  },
  getItemsForDocument(documentId) {
    if (!documentId) return [];
    return AppState.documentItems.filter(item => String(item.documentId) === String(documentId));
  },
  renderTable() {
    const table = DOM.create('div', 'table');
    const header = DOM.create('div', 'table-row table-header');
    ['Type', 'Number', 'Client', 'Date', 'Total', 'Actions'].forEach(label => header.appendChild(DOM.create('div', '', label)));
    table.appendChild(header);
    AppState.documents.forEach(doc => {
      const row = DOM.create('div', 'table-row');
      row.appendChild(DOM.create('div', '', doc.type || ''));
      row.appendChild(DOM.create('div', '', doc.number || ''));
      const client = AppState.clients.find(item => String(item.id) === String(doc.clientId));
      row.appendChild(DOM.create('div', '', client ? client.name : ''));
      row.appendChild(DOM.create('div', '', Format.date(doc.date)));
      row.appendChild(DOM.create('div', '', Format.currency(doc.total)));
      const actions = DOM.create('div', 'table-actions');
      const edit = DOM.create('button', 'link-btn', 'Edit');
      edit.onclick = () => {
        AppState.documentDraft = doc;
        AppState.documentItemsDraft = this.getItemsForDocument(doc.id);
        Router.render();
      };
      const remove = DOM.create('button', 'link-btn danger', 'Delete');
      remove.onclick = async () => {
        await runWithSyncStatus(() => API.deleteDocument(doc.id));
        await DataStore.refresh();
        Router.render();
      };
      actions.appendChild(edit);
      actions.appendChild(remove);
      row.appendChild(actions);
      table.appendChild(row);
    });
    return table;
  }
};

const InventoryPage = {
  render() {
    const container = DOM.create('div', 'page');
    container.appendChild(DOM.create('h1', 'page-title', 'Inventory'));
    const table = DOM.create('div', 'table');
    const header = DOM.create('div', 'table-row table-header');
    ['SKU', 'Product', 'Stock', 'Unit', 'Sale Price', 'Provider'].forEach(label => header.appendChild(DOM.create('div', '', label)));
    table.appendChild(header);
    AppState.inventory.forEach(item => {
      const row = DOM.create('div', 'table-row');
      row.appendChild(DOM.create('div', '', item.sku || ''));
      row.appendChild(DOM.create('div', '', item.name || ''));
      row.appendChild(DOM.create('div', '', item.stock));
      row.appendChild(DOM.create('div', '', item.unit || ''));
      row.appendChild(DOM.create('div', '', Format.currency(item.salePrice)));
      const provider = AppState.providers.find(provider => String(provider.id) === String(item.providerId));
      row.appendChild(DOM.create('div', '', provider ? provider.name : ''));
      table.appendChild(row);
    });
    container.appendChild(table);
    return container;
  }
};

async function init() {
  await DataStore.refresh();
  Router.render();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
