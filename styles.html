<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Inter", "Segoe UI", sans-serif;
  background: #f8fafc;
  color: #0f172a;
}

#root {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 240px;
  background: #0f172a;
  color: #e2e8f0;
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.sidebar-brand {
  font-size: 1.5rem;
  font-weight: 700;
  color: #f8fafc;
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.sync-status {
  margin-top: auto;
  border: 1px solid #334155;
  background: #1e293b;
  color: #e2e8f0;
  padding: 0.65rem 0.75rem;
  border-radius: 0.65rem;
  font-size: 0.85rem;
  text-align: left;
  cursor: default;
}

.sync-status::before {
  content: '';
  display: inline-block;
  width: 0.5rem;
  height: 0.5rem;
  border-radius: 999px;
  margin-right: 0.5rem;
  background: #94a3b8;
}

.sync-status.synced::before {
  background: #22c55e;
}

.sync-status.saving::before {
  background: #f59e0b;
}

.sync-status.unsynced::before {
  background: #ef4444;
}

.sync-status.error::before {
  background: #f87171;
}

.sidebar-link {
  background: transparent;
  border: 1px solid transparent;
  color: #cbd5f5;
  padding: 0.65rem 0.75rem;
  border-radius: 0.65rem;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s ease;
}

.sidebar-link:hover,
.sidebar-link.active {
  background: #1e293b;
  border-color: #334155;
  color: #fff;
}

.main {
  flex: 1;
  padding: 2rem;
}

.page {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.page-title {
  font-size: 2rem;
  font-weight: 700;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
}

.card {
  background: white;
  border-radius: 1rem;
  padding: 1.5rem;
  box-shadow: 0 6px 12px rgba(15, 23, 42, 0.08);
}

.card-label {
  color: #64748b;
  font-size: 0.9rem;
}

.card-value {
  font-size: 1.5rem;
  font-weight: 700;
  margin-top: 0.5rem;
}

.form-card {
  background: white;
  padding: 1.5rem;
  border-radius: 1rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  box-shadow: 0 6px 12px rgba(15, 23, 42, 0.08);
}

.form-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
}

label {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  font-size: 0.9rem;
  color: #1f2937;
}

input,
select {
  border: 1px solid #cbd5f5;
  border-radius: 0.6rem;
  padding: 0.55rem 0.75rem;
  font-size: 0.95rem;
}

.btn {
  background: #2563eb;
  color: white;
  border: none;
  padding: 0.7rem 1.3rem;
  border-radius: 0.6rem;
  font-weight: 600;
  cursor: pointer;
  align-self: flex-start;
}

.btn.secondary {
  background: #e2e8f0;
  color: #0f172a;
}

.table {
  background: white;
  border-radius: 1rem;
  overflow: hidden;
  box-shadow: 0 6px 12px rgba(15, 23, 42, 0.08);
}

.table-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 1rem;
  padding: 0.85rem 1rem;
  border-bottom: 1px solid #e2e8f0;
  align-items: center;
}

.table-header {
  background: #f1f5f9;
  font-weight: 600;
  color: #334155;
}

.table-actions {
  display: flex;
  gap: 0.5rem;
}

.link-btn {
  background: none;
  border: none;
  color: #2563eb;
  cursor: pointer;
  font-weight: 600;
}

.link-btn.danger {
  color: #dc2626;
}

.items-section {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.items-header {
  font-weight: 600;
  color: #1f2937;
}

.items-table {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.items-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 0.75rem;
  align-items: center;
}

.items-header-row {
  font-weight: 600;
  color: #475569;
}

@media (max-width: 900px) {
  #root {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
    flex-direction: row;
    flex-wrap: wrap;
  }
  .sync-status {
    margin-top: 0;
  }
  .main {
    padding: 1.5rem;
  }
}
</style>
